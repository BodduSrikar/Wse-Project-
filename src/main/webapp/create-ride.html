<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ride - Carpool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-car-front-fill me-2"></i>Carpool
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="dashboard.html">Home</a>
                <a class="nav-link active" href="create-ride.html">Create Ride</a>
                <a class="nav-link" href="search-ride.html">Find Ride</a>
                <a class="nav-link" href="complaints.html">Complaints</a>
                <a class="nav-link" href="reports.html">Reports</a>
                <a class="nav-link text-danger" href="index.html">Logout</a>
            </div>
        </div>
    </nav>
    <style>
        /* Apply to all inputs inside the card */
        
        .card input {
            background-color: #f8f9fa;
            /* light background */
            color: #212529;
            /* text color */
            border: 2px solid #ced4da;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        /* Placeholder text */
        
        .card input::placeholder {
            color: #6c757d;
        }
        /* On focus (when user clicks input) */
        
        .card input:focus {
            border-color: #0d6efd;
            /* blue border */
            box-shadow: 0 0 8px rgba(13, 110, 253, 0.3);
            background-color: #ffffff;
            outline: none;
        }
        /* Optional: hover effect */
        
        .card input:hover {
            border-color: #0d6efd;
        }
        /* Heading style */
        
        .card h3 {
            color: #0d6efd;
            font-weight: 600;
        }
        /* Card styling */
        
        .card {
            border-radius: 15px;
            background: #ffffff;
        }
    </style>
    <div class="container mt-5 pt-5 flex-grow-1">
        <div class="card shadow-lg p-5 mx-auto" style="max-width: 520px;">
            <h3 class="text-center mb-4"><i class="bi bi-plus-circle me-2"></i>Create New Ride</h3>

            <input id="source" class="form-control mb-3 py-3" placeholder="Source Location">
            <input id="destination" class="form-control mb-3 py-3" placeholder="Destination Location">
            <input id="time" type="time" class="form-control mb-3 py-3">
            <input id="seats" type="number" class="form-control mb-3 py-3" placeholder="Available Seats" min="1" max="6">

            <button onclick="createRide()" class="btn btn-primary btn-lg w-100">Create Ride</button>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="text-center py-4 mt-auto">
        <small>© 2026 B SRIKAR, Roll No: 24951A12B0 | All Rights Reserved</small>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
