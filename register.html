<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Carpool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- HEADER -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-car-front-fill me-2"></i>Carpool
            </a>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center mt-5">
        <div class="card shadow-lg p-5" style="width: 440px;">
            <div class="text-center mb-4">
                <i class="bi bi-person-plus-fill display-1 text-success"></i>
                <h3 class="mt-3 fw-bold">Create Account</h3>
            </div>

            <input id="name" class="form-control mb-3 py-3" placeholder="Full Name">
            <input id="contact" class="form-control mb-3 py-3" placeholder="Contact Number">
            <input id="username" class="form-control mb-3 py-3" placeholder="Username">
            <input id="password" type="password" class="form-control mb-3 py-3" placeholder="Password">

            <button onclick="registerUser()" class="btn btn-success btn-lg w-100">Register</button>

            <p class="text-center text-muted mt-3">
                Already have an account? <a href="login.html" class="text-decoration-none text-primary fw-bold">Login</a>
            </p>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="text-center py-4">
        <small>© 2026 B SRIKAR, Roll No: 24951A12B0 | All Rights Reserved</small>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
